<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - HealthCare Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Inter', 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f766e 0%, #0d9488 25%, #14b8a6 50%, #06b6d4 75%, #0891b2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding: 40px 0;
        position: relative;
        overflow: hidden;
      }
      
      body::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -20%;
        width: 800px;
        height: 800px;
        background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
        border-radius: 50%;
        animation: float 20s infinite ease-in-out;
      }
      
      body::after {
        content: '';
        position: absolute;
        bottom: -30%;
        left: -10%;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
        border-radius: 50%;
        animation: float 15s infinite ease-in-out reverse;
      }
      
      @keyframes float {
        0%, 100% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(30px, -30px) scale(1.1); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
      }
      
      .login-card {
        border-radius: 24px;
        border: none;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        overflow: hidden;
        position: relative;
        z-index: 1;
        animation: slideUp 0.6s ease-out;
      }
      
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .login-header {
        background: linear-gradient(135deg, #0f766e, #14b8a6);
        border-radius: 24px 24px 0 0;
        padding: 50px 40px;
        text-align: center;
        color: white;
        position: relative;
        overflow: hidden;
      }
      
      .login-header::before {
        content: '';
        position: absolute;
        top: -50%;
        right: -50%;
        width: 200px;
        height: 200px;
        background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
        border-radius: 50%;
      }
      
      .login-header i {
        position: relative;
        z-index: 1;
        animation: pulse 2s infinite ease-in-out;
      }
      
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      
      .form-control {
        border-radius: 12px;
        padding: 14px 18px;
        border: 2px solid #e2e8f0;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: #f8fafc;
      }
      
      .form-control:focus {
        border-color: #14b8a6;
        box-shadow: 0 0 0 4px rgba(20, 184, 166, 0.1);
        background: white;
      }
      
      .input-group-text {
        border-radius: 12px 0 0 12px;
        background: linear-gradient(135deg, #f0fdfa, #ccfbf1);
        border: 2px solid #e2e8f0;
        border-right: none;
        color: #0f766e;
        padding: 14px 16px;
      }
      
      .btn-login {
        border-radius: 12px;
        padding: 14px;
        font-weight: 700;
        font-size: 1.1rem;
        background: linear-gradient(135deg, #0f766e, #14b8a6);
        border: none;
        transition: all 0.3s ease;
        box-shadow: 0 4px 15px rgba(15, 118, 110, 0.3);
      }
      
      .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(15, 118, 110, 0.4);
        background: linear-gradient(135deg, #0d9488, #06b6d4);
      }
      
      .btn-login:active {
        transform: translateY(0);
      }
      
      .form-label {
        color: #475569;
        font-weight: 600;
        margin-bottom: 8px;
      }
      
      .divider {
        border-top: 2px solid #e2e8f0;
        margin: 24px 0;
      }
      
      .link-primary {
        color: #0f766e;
        text-decoration: none;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      
      .link-primary:hover {
        color: #14b8a6;
        text-decoration: underline;
      }
      
      .link-muted {
        color: #64748b;
        text-decoration: none;
        font-size: 0.875rem;
        transition: all 0.3s ease;
      }
      
      .link-muted:hover {
        color: #0f766e;
        text-decoration: none;
      }
      
      .alert {
        border-radius: 12px;
        border: none;
        padding: 14px 18px;
        animation: slideDown 0.4s ease-out;
      }
      
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      @media (max-width: 768px) {
        .login-header {
          padding: 40px 30px;
        }
        .card-body {
          padding: 30px !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
          <div class="card login-card">
            <div class="login-header">
              <i class="fas fa-heartbeat fa-3x mb-3"></i>
              <h4 class="fw-bold mb-2">HealthCare Portal</h4>
              <p class="opacity-75 mb-0">Welcome back! Sign in to your account</p>
            </div>
            <div class="card-body p-5">
              {% if messages %} 
                {% for message in messages %}
                  <div class="alert alert-{% if message.tags == 'error' %}danger{% else %}{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
                    <i class="fas fa-{% if message.tags == 'error' %}exclamation-circle{% elif message.tags == 'success' %}check-circle{% else %}info-circle{% endif %} me-2"></i>
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %} 
              {% endif %}
              
              <form method="post">
                {% csrf_token %}
                <div class="mb-4">
                  <label class="form-label">
                    <i class="fas fa-user me-2 text-primary"></i>Username
                  </label>
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="fas fa-user"></i>
                    </span>
                    <input
                      type="text"
                      name="username"
                      class="form-control"
                      placeholder="Enter your username"
                      required
                      autofocus
                    />
                  </div>
                </div>
                
                <div class="mb-4">
                  <label class="form-label">
                    <i class="fas fa-lock me-2 text-primary"></i>Password
                  </label>
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="fas fa-lock"></i>
                    </span>
                    <input
                      type="password"
                      name="password"
                      class="form-control"
                      placeholder="Enter your password"
                      required
                    />
                  </div>
                </div>
                
                <div class="mb-4">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label text-muted" for="rememberMe">
                      Remember me
                    </label>
                  </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-login w-100 mb-3">
                  <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
              </form>
              
              <div class="divider"></div>
              
              <div class="text-center">
                <p class="mb-3 text-muted">
                  Don't have an account?
                  <a href="{% url 'register' %}" class="link-primary">
                    <i class="fas fa-user-plus me-1"></i>Create Account
                  </a>
                </p>
                <a href="{% url 'home' %}" class="link-muted">
                  <i class="fas fa-arrow-left me-1"></i>Back to Home
                </a>
              </div>
            </div>
          </div>
          
          <div class="text-center mt-4">
            <p class="text-white-50 small">
              <i class="fas fa-shield-alt me-1"></i>Secure login powered by Django
            </p>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
